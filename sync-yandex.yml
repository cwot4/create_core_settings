name: Sync to Yandex Disk

on:
  push:
    branches: [main, master]
    paths:
      - "options.txt"
      - "servers.dat"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload to Yandex Disk
        env:
          YANDEX_TOKEN: ${{ secrets.YANDEX_TOKEN }}
          YANDEX_FOLDER: core_aquila
        run: |
          upload() {
            local file="$1"
            local remote_name="$2"

            if [ ! -f "$file" ]; then
              echo "SKIP: файл не найден: $file"
              return
            fi

            echo "Uploading ${remote_name}..."
            local remote_path="disk:/${YANDEX_FOLDER}/${remote_name}"

            href=$(curl -sf \
              -H "Authorization: OAuth ${YANDEX_TOKEN}" \
              "https://cloud-api.yandex.net/v1/disk/resources/upload?path=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${remote_path}'))")&overwrite=true" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['href'])")

            if [ -z "$href" ]; then
              echo "ERROR: не удалось получить URL для ${remote_name}"
              return
            fi

            curl -sf -X PUT "$href" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${file}"

            echo "OK: ${remote_name}"
          }

          upload "options.txt" "options.txt"
          upload "servers.dat" "servers.dat"

          echo "Sync complete!"

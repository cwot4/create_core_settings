name: Sync to Yandex Disk

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Upload release assets to Yandex Disk
        env:
          YANDEX_TOKEN: ${{ secrets.YANDEX_TOKEN }}
          YANDEX_FOLDER: core_aquila
          GH_REPO: ${{ github.repository }}
        run: |
          upload_url() {
            local url="$1"
            local remote_name="$2"

            echo "Downloading ${remote_name}..."
            curl -sL "$url" -o "/tmp/${remote_name}"

            if [ ! -s "/tmp/${remote_name}" ]; then
              echo "WARN: файл пустой или не скачался: ${remote_name}"
              return
            fi

            local remote_path="disk:/${YANDEX_FOLDER}/${remote_name}"
            echo "Uploading ${remote_name} to Yandex Disk..."

            href=$(curl -sf \
              -H "Authorization: OAuth ${YANDEX_TOKEN}" \
              "https://cloud-api.yandex.net/v1/disk/resources/upload?path=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${remote_path}'))")&overwrite=true" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['href'])")

            if [ -z "$href" ]; then
              echo "ERROR: не удалось получить URL для ${remote_name}"
              return
            fi

            curl -sf -X PUT "$href" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@/tmp/${remote_name}"

            echo "OK: ${remote_name}"
          }

          BASE="https://github.com/${GH_REPO}/releases/latest/download"
          upload_url "${BASE}/options.txt" "options.txt"
          upload_url "${BASE}/servers.dat" "servers.dat"

          echo "Sync complete!"
